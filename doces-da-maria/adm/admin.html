<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor — Doces da Maria</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="admin-header">
    <div class="container">
      <div class="admin-logo">
        <div class="logo-icone">DM</div>
        <h1>Área do Editor</h1>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-sec btn-sm" id="btn-export">Exportar JSON</button>
        <a href="../index.html" class="btn btn-primary btn-sm">Ver Catálogo</a>
      </div>
    </div>
  </header>

  <div class="stats">
    <span>Total: <strong id="s-total">0</strong></span>
    <span>Destaques: <strong id="s-dest">0</strong></span>
    <span>Categorias: <strong id="s-cats">0</strong></span>
  </div>

  <main class="admin-wrap">

    <section>
      <div class="form-card">
        <h2 id="form-titulo">Novo Doce</h2>

        <div class="msg-erro" id="msg-erro"></div>
        <div class="msg-ok" id="msg-ok"></div>

        <div class="form-grupo">
          <label>Nome *</label>
          <input type="text" id="f-nome" placeholder="Ex: Brigadeiro de Pistache">
        </div>

        <div class="form-grupo">
          <label>Descrição *</label>
          <textarea id="f-desc" rows="3" placeholder="Descreva o doce..."></textarea>
        </div>

        <div class="form-grupo">
          <label>Preço (R$) *</label>
          <input type="number" id="f-preco" placeholder="0.00" step="0.01" min="0">
        </div>

        <div class="form-grupo">
          <label>Categoria *</label>
          <select id="f-cat">
            <option value="">Selecione...</option>
            <option value="brigadeiros">Brigadeiros</option>
            <option value="bolos">Bolos</option>
            <option value="tortas">Tortas</option>
            <option value="trufas">Trufas</option>
            <option value="docinhos">Docinhos</option>
            <option value="outros">Outros</option>
          </select>
        </div>

        <div class="form-grupo">
          <label>URL da Imagem</label>
          <input type="url" id="f-img" placeholder="https://...">
        </div>

        <div class="check-grupo">
          <input type="checkbox" id="f-dest">
          <label for="f-dest">Marcar como destaque</label>
        </div>

        <div class="form-btns">
          <button class="btn btn-primary" id="btn-salvar">Salvar</button>
          <button class="btn btn-sec" id="btn-limpar">Limpar</button>
        </div>
      </div>
    </section>

    <section>
      <div class="lista-card">
        <div class="lista-topo">
          <h2>Doces Cadastrados</h2>
          <input type="text" class="filtro-lista" id="filtro-lista" placeholder="Filtrar...">
        </div>
        <div id="lista-admin"></div>
      </div>
    </section>

  </main>

  <div class="modal-bg" id="modal">
    <div class="modal-box">
      <h3>Confirmar exclusão?</h3>
      <p id="modal-txt">Essa ação não pode ser desfeita.</p>
      <div class="modal-btns">
        <button class="btn btn-rm" id="btn-confirma-del">Deletar</button>
        <button class="btn btn-sec" id="btn-cancela">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="../js/models/DoceModel.js"></script>
  <script src="../js/services/StorageService.js"></script>
  <script src="../js/controllers/DoceController.js"></script>
  <script src="../js/controllers/AdminController.js"></script>
</body>
</html>
